  <!-- CHAT -->
  <div class="card">
    <h2>Chat</h2>
    <div>
      <label>Mensaje</label>
      <textarea id="chatText" placeholder="Escribe tu pregunta…"></textarea>
    </div>
    <button id="chatBtn" disabled>Enviar</button>
    <div id="chatStatus" class="status"></div>
    <div id="chatResponse" class="response-box" style="display:none"></div>
  </div>
</div>

<script>
  let jwtToken = null;

  const loginBtn     = document.getElementById('loginBtn');
  const chatBtn      = document.getElementById('chatBtn');
  const loginStatus  = document.getElementById('loginStatus');
  const tokenBadge   = document.getElementById('tokenBadge');
  const chatStatus   = document.getElementById('chatStatus');
  const chatResponse = document.getElementById('chatResponse');

  function setStatus(el, message, isOk) {
    el.textContent = message;
    el.className = 'status ' + (isOk ? 'ok' : 'err');
  }

  loginBtn.addEventListener('click', async () => {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();

    loginBtn.disabled = true;
    loginBtn.textContent = 'Conectando…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Error desconocido');

      jwtToken = data.token;
      setStatus(loginStatus, 'Login correcto', true);
      chatBtn.disabled = false;
    } catch (err) {
      setStatus(loginStatus, err.message, false);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Iniciar sesión';
    }
  });

  chatBtn.addEventListener('click', async () => {
    const text = document.getElementById('chatText').value.trim();
    if (!text) return;

    chatBtn.disabled = true;
    chatBtn.textContent = 'Enviando…';
    chatStatus.className = 'status';
    chatResponse.style.display = 'none';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${jwtToken}`,
        },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Error desconocido');

      chatResponse.textContent = data.reply;
      chatResponse.style.display = 'block';
      chatStatus.className = 'status';
    } catch (err) {
      setStatus(chatStatus, err.message, false);
    } finally {
      chatBtn.disabled = false;
      chatBtn.textContent = 'Enviar';
    }
  });

  document.getElementById('chatText').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !chatBtn.disabled) {
      e.preventDefault();
      chatBtn.click();
    }
  });
</script>
</body>
</html>
